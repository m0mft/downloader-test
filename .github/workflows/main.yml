name: Download File

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  downloader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download the file
        run: |
          wget "https://packages.openvpn.net/connect/v3/openvpn-connect-3.8.1.5790_signed.dmg" -O downloaded.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: openvpn-connect
          path: downloaded.bin
